experiment_id: universal-trigger-test
author: "LLM Red-Teaming Toolkit"
description: "Test universal/transferable trigger attacks that elicit behaviour across models"

adapters:
  - instance_id: adapter-stub
    adapter: stub
    model_id: stub-v1

generators:
  - instance_id: generator-universal-trigger
    name: universal-trigger
    config:
      seed: 42
      search_mode: false

judges:
  - instance_id: judge-heuristic
    name: heuristic

batch_size: 8
num_batches: 2
max_concurrency: 4
max_combo_concurrency: 1
pipeline_mode: "batch"
output: "logs/universal-trigger.jsonl"
