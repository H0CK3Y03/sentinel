################################################################################
# MULTI-EVERYTHING EXAMPLE MANIFEST
#
#
# This example is intentionally broader than a simple multi-adapter manifest.
# It shows multiple adapters, multiple generators, multiple judges, and the
# global run controls that shape execution.
################################################################################

experiment_id: "multi-everything-001"
author: "Adam Veselý"
description: >
  Comprehensive experiment showing how to combine multiple adapters, multiple
  generators, and multiple judges in one run. Useful as a reference for how
  Sentinel expands a manifest into the full execution cross-product and how the
  resulting logs are broken down by adapter and attack type.


# MODEL ADAPTERS
# ============================================================================
# Each adapter represents a model endpoint or backend configuration.

adapters:
  - instance_id: "adapter-a"
    adapter: "stub"
    model_id: "stub-v1"
    config:
      latency_ms: 50
      # [OPTIONAL] Adapter-specific settings. For the stub adapter this is just
      # simulated latency, but real adapters may include model_path, api_key,
      # temperature, max_tokens, n_ctx, and similar backend options.

  - instance_id: "adapter-b"
    adapter: "stub"
    model_id: "stub-v2"
    config:
      latency_ms: 100
      # Same adapter type, separate instance ID and different attributes.


# ATTACK GENERATORS
# ============================================================================
# Each generator defines a different attack strategy. Every generator is run
# against every adapter.

generators:
  - instance_id: "generator-a"
    name: "prompt-injection"
    config:
      seed: 42
      # [OPTIONAL] Generator seed. If omitted, the manifest-level seed is used.

  - instance_id: "generator-b"
    name: "prompt-injection"
    config:
      seed: 43
      # Same generator type, different attributes, separate instance ID.

  - instance_id: "generator-c"
    name: "universal-trigger"
    config:
      seed: 44
      # Another attack family.


# JUDGE PIPELINE
# ============================================================================
# Judges are ordered and their verdicts are aggregated into a final verdict.

judges:
  - instance_id: "judge-a"
    name: "heuristic"
    config:
      refusal_threshold: 1
      compliance_threshold: 1
      # [OPTIONAL] Rule-based thresholds for the heuristic judge.

  - instance_id: "judge-b"
    name: "heuristic"
    config:
      refusal_threshold: 2
      compliance_threshold: 1
      # Same judge type, different thresholds, separate instance ID.

  - instance_id: "judge-c"
    name: "stub-judge"
    config: {}
    # [OPTIONAL] A second judge layer to show multi-judge evaluation.


# EXECUTION PARAMETERS
# ============================================================================
# These are the global run controls shared by all components.

seed: 42
batch_size: 8
num_batches: 2
max_concurrency: 4
rate_limit_rps: 0


# OUTPUT
# ============================================================================

output: "logs/multi-everything-001.jsonl"
# Expected total prompts:
#   2 adapters × 3 generators × 2 batches × 8 prompts = 96
#
# The resulting log and report will include:
#   - metrics_by_adapter
#   - metrics_by_attack_type
#   - metrics_by_judge
#   - top compliance and refusal prompts
#   - elapsed time and aggregate verdict distribution