experiment_id: comprehensive-attacks-test
author: "LLM Red-Teaming Toolkit"
description: "Comprehensive test of all major attack types with detailed metric collection"

adapters:
  - adapter: stub
    model_id: stub-v1
  - adapter: llama-cpp
    model_id: qwen2.5-7b
    config:
      model_path: /home/hockey/models/Qwen2.5-7B-Instruct-GGUF/qwen2.5-7b-instruct-q3_k_m.gguf

generators:
  - name: single-turn-jailbreak
    config:
      seed: 42
  - name: prompt-injection
    config:
      seed: 42
  - name: token-perturbation
    config:
      seed: 42
  - name: universal-trigger
    config:
      seed: 42
  - name: multi-turn-conversation
    config:
      seed: 42
  - name: llama-cpp-attacker
    config:
      model_path: /home/hockey/models/Qwen2.5-7B-Instruct-GGUF/qwen2.5-7b-instruct-q3_k_m.gguf

judges:
  - name: heuristic
    config:
      refusal_threshold: 1
      compliance_threshold: 1
  - name: llama-cpp-judge
    config:
      model_path: /home/hockey/models/Qwen2.5-7B-Instruct-GGUF/qwen2.5-7b-instruct-q3_k_m.gguf

batch_size: 16
num_batches: 2
max_concurrency: 8
rate_limit_rps: 0  # No rate limit for local testing
output: "logs/comprehensive-attacks.jsonl"
