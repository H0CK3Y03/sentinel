# Experiment manifest - local Qwen judge pipeline

experiment_id: "qwen36-judge-001"
author: "Adam Veselý"
description: >
  Hybrid red-teaming pipeline that keeps the generator lightweight and uses
  a local Qwen3.6-35B-A3B GGUF model as the LLM judge.

# -- Model adapter -----------------------------------------------------------
adapters:
  - instance_id: adapter-stub
    adapter: stub
    model_id: stub-v1
    config:
      latency_ms: 50

# -- Attack generator --------------------------------------------------------
generators:
  - instance_id: generator-stub
    name: stub-template
    config:
      seed: 42

# -- Judge pipeline (ordered) -----------------------------------------------
judges:
  - instance_id: judge-heuristic
    name: heuristic
    config:
      refusal_threshold: 1
      compliance_threshold: 1
  - instance_id: judge-llama
    name: llama-cpp-judge
    config:
      model_path: /home/hockey/models/Qwen3.6-35B-A3B-GGUF/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      n_ctx: 2048
      n_gpu_layers: 0
      n_threads: 16
      temperature: 0.0
      max_tokens: 128

# -- Execution parameters ---------------------------------------------------
seed: 42
batch_size: 4
num_batches: 1
max_concurrency: 1
max_combo_concurrency: 1
pipeline_mode: "batch"
rate_limit_rps: 0

# -- Output ------------------------------------------------------------------
output: "logs/qwen36-judge-001.jsonl"